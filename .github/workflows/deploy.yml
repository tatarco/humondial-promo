name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_BASE44_URL: https://biz-flow-erp-6829504d.base44.app
          VITE_BASE44_API_KEY: ${{ secrets.VITE_BASE44_API_KEY }}
          VITE_CAMPAIGN_DISPLAY_TZ: Asia/Jerusalem
          VITE_CAMPAIGN_PARTICIPATION_PTS: "10"
          VITE_CAMPAIGN_LOCK_OFFSET_MIN: "0"
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@3 pages deploy dist --project-name=humondial-promo --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
